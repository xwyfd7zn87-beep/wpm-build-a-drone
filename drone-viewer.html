<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>WPM AeroMed – 3D Drone Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1320;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;touch-action:none}
canvas{display:block}
#title{position:fixed;top:16px;left:16px;pointer-events:none;z-index:10}
#title h1{color:#f59e0b;font-size:18px;font-weight:700;letter-spacing:.5px;text-shadow:0 0 16px rgba(245,158,11,.4)}
#title p{color:#64748b;font-size:12px;margin-top:3px;letter-spacing:.3px}
#hud{position:fixed;bottom:16px;left:16px;background:rgba(11,19,32,.8);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:10px 14px;pointer-events:none;z-index:10;backdrop-filter:blur(6px)}
#hud div{color:#94a3b8;font-size:11px;line-height:1.9}
#hud b{color:#f59e0b;font-size:11px}
#hint{position:fixed;bottom:16px;right:16px;color:#334155;font-size:10px;text-align:right;pointer-events:none;line-height:1.7}
#badge{position:fixed;top:16px;right:16px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:20px;padding:4px 12px;color:#f59e0b;font-size:11px;font-weight:600;pointer-events:none}
</style>
</head>
<body>
<div id="title"><h1>WPM AeroMed</h1><p>3D Drone Configurator</p></div>
<div id="hud"></div>
<div id="hint">Drag · rotate<br>Scroll · zoom<br>Two-finger · pan</div>
<div id="badge">LIVE PREVIEW</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ── Params ──────────────────────────────────────────────────────
const q = new URLSearchParams(location.search);
const MOTORS  = Math.max(4, Math.min(8, parseInt(q.get('motors')) || 4));
const FRAME   = parseInt(q.get('frame')) || 450;
const PAYLOAD = (q.get('payload') || 'none').toLowerCase();
const DNAME   = q.get('name') || 'Custom Build';
const S       = FRAME / 450; // scale factor

// HUD
document.getElementById('hud').innerHTML =
  `<div><b>Build:</b> ${DNAME}</div>
   <div><b>Frame:</b> ${FRAME} mm</div>
   <div><b>Motors:</b> ${MOTORS}</div>
   <div><b>Payload:</b> ${PAYLOAD === 'none' ? '—' : PAYLOAD}</div>`;

// ── Scene ───────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1320);
scene.fog = new THREE.FogExp2(0x0b1320, 0.06 / S);

const W = innerWidth, H = innerHeight;
const cam = new THREE.PerspectiveCamera(45, W / H, 0.01, 200);
cam.position.set(2.8 * S, 1.6 * S, 2.8 * S);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(cam, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.8;
controls.minDistance = 0.8 * S;
controls.maxDistance = 12 * S;
controls.target.set(0, 0, 0);

// Stop auto-rotate on user interaction
renderer.domElement.addEventListener('pointerdown', () => { controls.autoRotate = false; }, { once: true });

// ── Lights ──────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1e3a5f, 1.2));

const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(4, 8, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 30;
sun.shadow.camera.left = sun.shadow.camera.bottom = -3 * S;
sun.shadow.camera.right = sun.shadow.camera.top = 3 * S;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xf59e0b, 0.4);
fill.position.set(-4, 1, -4);
scene.add(fill);

const rim = new THREE.PointLight(0x38bdf8, 0.6, 15 * S);
rim.position.set(0, 4 * S, -4 * S);
scene.add(rim);

// ── Materials ───────────────────────────────────────────────────
const mBody  = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.55, metalness: 0.5 });
const mArm   = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.7,  metalness: 0.35 });
const mMount = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.45, metalness: 0.65 });
const mMotor = new THREE.MeshStandardMaterial({ color: 0xf59e0b, roughness: 0.35, metalness: 0.7, emissive: 0xf59e0b, emissiveIntensity: 0.08 });
const mProp  = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.9,  metalness: 0.1, side: THREE.DoubleSide });
const mGear  = new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.65, metalness: 0.4 });
const mLens  = new THREE.MeshStandardMaterial({ color: 0x0ea5e9, roughness: 0.08, metalness: 0.95, emissive: 0x0ea5e9, emissiveIntensity: 0.25 });
const mAccent= new THREE.MeshStandardMaterial({ color: 0xf59e0b, roughness: 0.4,  metalness: 0.6, emissive: 0xf59e0b, emissiveIntensity: 0.12 });
const mLidar = new THREE.MeshStandardMaterial({ color: 0x64748b, roughness: 0.3,  metalness: 0.8 });

// ── Drone group ──────────────────────────────────────────────────
const drone = new THREE.Group();
scene.add(drone);

// Helper: add mesh
function add(geo, mat, x, y, z, rx, ry, rz) {
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = m.receiveShadow = true;
  if (x !== undefined) m.position.set(x, y, z);
  if (rx !== undefined) m.rotation.set(rx, ry, rz);
  drone.add(m);
  return m;
}

// ── Central body ─────────────────────────────────────────────────
add(new THREE.CylinderGeometry(0.22*S, 0.17*S, 0.10*S, 8), mBody, 0, 0, 0);
// Top plate accent
add(new THREE.CylinderGeometry(0.19*S, 0.19*S, 0.018*S, 8), mAccent, 0, 0.059*S, 0);
// Battery rail
add(new THREE.BoxGeometry(0.32*S, 0.04*S, 0.10*S), mArm, 0, 0.04*S, 0);
// LED strip (front)
add(new THREE.BoxGeometry(0.28*S, 0.012*S, 0.012*S), mAccent, 0, -0.045*S, 0.17*S);

// ── Arms & Motors ─────────────────────────────────────────────────
const ARM = 0.52 * S; // arm reach from center

for (let i = 0; i < MOTORS; i++) {
  const angle = (i * Math.PI * 2) / MOTORS;
  const cx = Math.sin(angle);
  const cz = Math.cos(angle);

  // Tapered arm as box
  const aGrp = new THREE.Group();
  const aGeo = new THREE.BoxGeometry(0.04*S, 0.035*S, ARM * 0.9);
  const aM = new THREE.Mesh(aGeo, mArm);
  aM.castShadow = true;
  aM.position.z = ARM * 0.45;
  aGrp.add(aM);
  aGrp.rotation.y = angle;
  drone.add(aGrp);

  // Motor mount ring
  add(new THREE.CylinderGeometry(0.052*S, 0.052*S, 0.038*S, 8), mMount,
      cx*ARM, 0, cz*ARM);

  // Motor bell (amber accent)
  add(new THREE.CylinderGeometry(0.042*S, 0.052*S, 0.055*S, 8), mMotor,
      cx*ARM, 0.047*S, cz*ARM);

  // Motor shaft top
  add(new THREE.CylinderGeometry(0.008*S, 0.008*S, 0.02*S, 6), mMount,
      cx*ARM, 0.085*S, cz*ARM);

  // Props: 2 blades
  for (let b = 0; b < 2; b++) {
    const bladeGeo = new THREE.BoxGeometry(0.36*S, 0.006*S, 0.055*S);
    const blade = new THREE.Mesh(bladeGeo, mProp);
    blade.castShadow = true;
    blade.position.set(cx*ARM, 0.096*S, cz*ARM);
    blade.rotation.y = angle + b * Math.PI * 0.5;
    blade.rotation.z = (i % 2 === 0) ? 0.06 : -0.06; // CCW / CW
    drone.add(blade);
  }
}

// ── Landing gear ─────────────────────────────────────────────────
// 4 diagonal struts
for (let i = 0; i < 4; i++) {
  const ga = (i * Math.PI / 2) + Math.PI / 4;
  const gx = Math.sin(ga) * 0.28 * S;
  const gz = Math.cos(ga) * 0.28 * S;
  const legGeo = new THREE.CylinderGeometry(0.009*S, 0.009*S, 0.20*S, 6);
  const leg = new THREE.Mesh(legGeo, mGear);
  leg.castShadow = true;
  leg.position.set(gx, -0.15*S, gz);
  leg.rotation.x = (i < 2 ? 1 : -1) * 0.15;
  leg.rotation.z = (i % 2 === 0 ? 1 : -1) * 0.15;
  drone.add(leg);
}
// Front skid bar
add(new THREE.CylinderGeometry(0.009*S, 0.009*S, 0.56*S, 6), mGear,
    0, -0.245*S, 0.28*S, 0, 0, Math.PI/2);
// Rear skid bar
add(new THREE.CylinderGeometry(0.009*S, 0.009*S, 0.56*S, 6), mGear,
    0, -0.245*S, -0.28*S, 0, 0, Math.PI/2);

// ── Payload ───────────────────────────────────────────────────────
if (PAYLOAD === 'camera') {
  // Gimbal housing
  add(new THREE.BoxGeometry(0.11*S, 0.08*S, 0.09*S), mBody, 0, -0.105*S, 0.04*S);
  // Lens element
  add(new THREE.CylinderGeometry(0.032*S, 0.028*S, 0.05*S, 12), mLens,
      0, -0.105*S, 0.092*S, Math.PI/2, 0, 0);
  // Lens ring
  add(new THREE.TorusGeometry(0.032*S, 0.006*S, 8, 24), mAccent,
      0, -0.105*S, 0.092*S, Math.PI/2, 0, 0);
  // Mount arm
  add(new THREE.BoxGeometry(0.018*S, 0.05*S, 0.018*S), mGear, 0, -0.075*S, 0);
} else if (PAYLOAD === 'lidar') {
  // LiDAR disc on top of body
  add(new THREE.CylinderGeometry(0.13*S, 0.13*S, 0.045*S, 16), mLidar, 0, 0.12*S, 0);
  // Rotating scan ring
  add(new THREE.TorusGeometry(0.115*S, 0.009*S, 8, 32), mAccent, 0, 0.145*S, 0, Math.PI/2, 0, 0);
  // Window strip
  add(new THREE.CylinderGeometry(0.125*S, 0.125*S, 0.016*S, 16, 1, true), mLens, 0, 0.12*S, 0);
  // Support post
  add(new THREE.CylinderGeometry(0.012*S, 0.012*S, 0.04*S, 6), mGear, 0, 0.095*S, 0);
}

// ── Grid & Ground ─────────────────────────────────────────────────
const grid = new THREE.GridHelper(16, 24, 0x1e3a5f, 0x0d2035);
grid.position.y = -0.55 * S;
scene.add(grid);

// Shadow catcher
const shadowMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(6, 6),
  new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.18 })
);
shadowMesh.rotation.x = -Math.PI / 2;
shadowMesh.position.y = -0.549 * S;
scene.add(shadowMesh);

// ── Star field ────────────────────────────────────────────────────
const verts = [];
for (let i = 0; i < 300; i++) {
  verts.push(
    (Math.random() - 0.5) * 30,
    (Math.random() - 0.5) * 30,
    (Math.random() - 0.5) * 30
  );
}
const sg = new THREE.BufferGeometry();
sg.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0x1e3a5f, size: 0.06 })));

// ── Resize ────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Animate ───────────────────────────────────────────────────────
let t = 0;
function tick() {
  requestAnimationFrame(tick);
  t += 0.016;
  drone.position.y = Math.sin(t * 1.4) * 0.028 * S;
  controls.update();
  renderer.render(scene, cam);
}
tick();
</script>
</body>
</html>
