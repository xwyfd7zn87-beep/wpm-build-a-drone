<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Drone Preview — WPM AeroMed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0b1320;font-family:'Montserrat','Segoe UI',sans-serif}
canvas{display:block;touch-action:none}

/* ── HUD ──────────────────────────────────────────────────────────────── */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;
}
.hud-header{
  background:rgba(11,19,32,0.88);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:2px solid #f59e0b;
  padding:10px 18px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
}
.hud-brand{display:flex;align-items:center;gap:10px}
.hud-mark{
  background:#f59e0b;color:#0b1320;
  font-weight:900;font-size:13px;padding:5px 9px;
  border-radius:4px;letter-spacing:0.03em;line-height:1;
  font-family:'Montserrat',sans-serif;
}
.hud-title{
  font-weight:800;font-size:14px;color:#eef3f8;
  letter-spacing:0.04em;text-transform:uppercase;
  font-family:'Montserrat',sans-serif;
}
.hud-specs{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.hud-spec{
  font-size:11px;color:#8fa0b8;
  font-family:'Space Mono',monospace;
  text-transform:uppercase;letter-spacing:0.07em;
}
.hud-spec strong{color:#f59e0b;font-weight:700}

/* ── BOTTOM TIP ──────────────────────────────────────────────────────── */
#tip{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  background:rgba(11,19,32,0.78);
  border:1px solid rgba(245,158,11,0.32);
  border-radius:20px;padding:8px 20px;
  font-size:11px;color:#8fa0b8;
  font-family:'Space Mono',monospace;
  text-transform:uppercase;letter-spacing:0.09em;
  pointer-events:none;
  transition:opacity 0.6s;white-space:nowrap;z-index:10;
}
#tip.hidden{opacity:0}

/* ── BACK BUTTON ─────────────────────────────────────────────────────── */
#btnClose{
  position:fixed;bottom:18px;right:18px;
  background:rgba(245,158,11,0.13);
  border:1px solid rgba(245,158,11,0.38);
  color:#f59e0b;
  font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;
  padding:10px 22px;border-radius:8px;cursor:pointer;z-index:10;
  text-decoration:none;display:inline-flex;align-items:center;gap:6px;
  transition:background 0.18s;
}
#btnClose:hover{background:rgba(245,158,11,0.24)}

/* ── LOADING ─────────────────────────────────────────────────────────── */
#loading{
  position:fixed;inset:0;background:#0b1320;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:200;transition:opacity 0.55s;
}
#loading.hidden{opacity:0;pointer-events:none}
.ld-mark{
  background:#f59e0b;color:#0b1320;
  font-family:'Montserrat',sans-serif;font-weight:900;font-size:26px;
  padding:12px 18px;border-radius:8px;margin-bottom:22px;
}
.ld-text{
  color:#8fa0b8;font-size:12px;
  font-family:'Space Mono',monospace;
  text-transform:uppercase;letter-spacing:0.12em;
}
.ld-bar{
  width:180px;height:3px;background:rgba(255,255,255,0.08);
  border-radius:2px;margin-top:18px;overflow:hidden;
}
.ld-fill{
  height:100%;width:0%;background:#f59e0b;border-radius:2px;
  animation:ldanim 1.1s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes ldanim{to{width:100%}}

@media(max-width:560px){
  .hud-title{font-size:12px}
  .hud-mark{font-size:11px;padding:4px 7px}
  .hud-specs{gap:10px}
  .hud-spec{font-size:10px}
  #tip{font-size:10px;padding:6px 14px;bottom:66px}
  #btnClose{font-size:12px;padding:9px 16px;bottom:14px;right:14px}
}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <div class="ld-mark">WPM</div>
  <div class="ld-text">Rendering your drone…</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-header">
    <div class="hud-brand">
      <span class="hud-mark">WPM</span>
      <span class="hud-title">AeroMed · Drone Preview</span>
    </div>
    <div class="hud-specs" id="hudSpecs"></div>
  </div>
</div>

<!-- INTERACTION TIP -->
<div id="tip">Drag to rotate · Pinch to zoom · Two fingers to pan</div>

<!-- CLOSE / BACK BUTTON -->
<button id="btnClose" onclick="window.close()">✕ Close Preview</button>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
(function(){
'use strict';

/* ── URL PARAMS ─────────────────────────────────────────────────────────── */
var p = new URLSearchParams(window.location.search);
var frameSize   = parseInt(p.get('frame'))  || 450;   // 250 | 450 | 680
var motorRaw    = parseInt(p.get('motors')) || 4;      // 4 | 6 | 8
var payload     = p.get('payload') || 'none';         // camera | lidar | none
var colorScheme = p.get('color')   || 'dark';         // dark | orange | white

// Clamp motors to supported values (4 / 6 / 8)
var motors = motorRaw <= 5 ? 4 : motorRaw <= 7 ? 6 : 8;

// Arm length scales with frame class
var ARM = frameSize <= 250 ? 0.68 : frameSize <= 450 ? 1.08 : 1.52;

/* ── PALETTE ────────────────────────────────────────────────────────────── */
var AMBER   = 0xf59e0b;
var BG_HEX  = 0x0b1320;
var bodyHex, accentHex;
switch(colorScheme){
  case 'orange': bodyHex = 0xb85510; accentHex = AMBER; break;
  case 'white':  bodyHex = 0xc2cedd; accentHex = AMBER; break;
  default:       bodyHex = 0x1c2d44; accentHex = AMBER; break;
}
var motorHex  = 0x090f18;
var propHex   = 0x253448;
var legHex    = 0x111e2e;

/* ── SCENE ──────────────────────────────────────────────────────────────── */
var scene = new THREE.Scene();
scene.background = new THREE.Color(BG_HEX);
scene.fog = new THREE.FogExp2(BG_HEX, 0.032);

/* ── CAMERA ─────────────────────────────────────────────────────────────── */
var camera = new THREE.PerspectiveCamera(52, window.innerWidth/window.innerHeight, 0.05, 120);
camera.position.set(ARM*2.6, ARM*1.8, ARM*3.2);
camera.lookAt(0, 0, 0);

/* ── RENDERER ───────────────────────────────────────────────────────────── */
var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

/* ── LIGHTS ─────────────────────────────────────────────────────────────── */
scene.add(new THREE.AmbientLight(0x8aaabb, 0.55));

var sun = new THREE.DirectionalLight(0xfff8e8, 1.1);
sun.position.set(5, 9, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left   = -5;
sun.shadow.camera.right  =  5;
sun.shadow.camera.top    =  5;
sun.shadow.camera.bottom = -5;
sun.shadow.camera.near   = 0.1;
sun.shadow.camera.far    = 30;
scene.add(sun);

var fill = new THREE.DirectionalLight(0x3a6080, 0.38);
fill.position.set(-4, 2, -5);
scene.add(fill);

var rim = new THREE.DirectionalLight(0xf59e0b, 0.22);
rim.position.set(0, -3, -6);
scene.add(rim);

/* ── ORBIT CONTROLS ─────────────────────────────────────────────────────── */
var controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.3;
controls.minDistance = ARM * 1.4;
controls.maxDistance = ARM * 9;
controls.maxPolarAngle = Math.PI * 0.80;
controls.target.set(0, 0, 0);

var interacted = false;
function stopAuto(){
  if(!interacted){
    controls.autoRotate = false;
    interacted = true;
    document.getElementById('tip').classList.add('hidden');
  }
}
renderer.domElement.addEventListener('pointerdown', stopAuto, {passive:true});
renderer.domElement.addEventListener('wheel',       stopAuto, {passive:true});
renderer.domElement.addEventListener('touchstart',  stopAuto, {passive:true});

/* ── MATERIALS ──────────────────────────────────────────────────────────── */
function phong(hex, shine){
  return new THREE.MeshPhongMaterial({color:hex, shininess:shine||80});
}
var bodyMat   = phong(bodyHex, 100);
var accentMat = phong(accentHex, 160);
var motorMat  = phong(motorHex, 55);
var propMat   = new THREE.MeshPhongMaterial({
  color:propHex, shininess:30, transparent:true, opacity:0.80
});
var armMat    = phong(bodyHex, 60);
var legMat    = phong(legHex, 35);

/* ── BUILD DRONE GROUP ──────────────────────────────────────────────────── */
var drone = new THREE.Group();
scene.add(drone);

// Central body — main plate
var bodyGeo  = new THREE.BoxGeometry(0.54, 0.13, 0.54);
var bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
bodyMesh.position.y = 0.065;
bodyMesh.castShadow = true;
drone.add(bodyMesh);

// Top accent plate
var topGeo  = new THREE.BoxGeometry(0.36, 0.032, 0.36);
var topMesh = new THREE.Mesh(topGeo, accentMat);
topMesh.position.y = 0.15;
drone.add(topMesh);

// Bottom plate
var botGeo  = new THREE.BoxGeometry(0.46, 0.025, 0.46);
var botMesh = new THREE.Mesh(botGeo, bodyMat);
botMesh.position.y = -0.005;
drone.add(botMesh);

// FC board (small amber square on top)
var fcGeo  = new THREE.BoxGeometry(0.16, 0.018, 0.16);
var fcMesh = new THREE.Mesh(fcGeo, accentMat);
fcMesh.position.set(0, 0.178, 0);
drone.add(fcMesh);

// Antenna
var antGeo  = new THREE.CylinderGeometry(0.008, 0.008, 0.18, 6);
var antMesh = new THREE.Mesh(antGeo, phong(0x111820, 40));
antMesh.position.set(0.12, 0.27, 0.12);
drone.add(antMesh);

/* ── ARMS, MOTORS, PROPS ────────────────────────────────────────────────── */
var angleStep = (Math.PI * 2) / motors;
// Quads use X-config (45° offset); hex/octo use + config
var angleOffset = motors === 4 ? Math.PI / 4 : 0;

// Prop radius — shrinks with more motors to avoid overlap
var propRadius = ARM * (motors === 4 ? 0.37 : motors === 6 ? 0.28 : 0.21);

for(var i = 0; i < motors; i++){
  var angle = angleStep * i + angleOffset;

  // Each arm is a group rotated around Y so arm geometry (along +X) aligns with angle
  var ag = new THREE.Group();
  ag.rotation.y = -angle;
  drone.add(ag);

  // Arm tube — cylinder lying horizontal along X
  var armGeo  = new THREE.CylinderGeometry(0.042, 0.042, ARM, 8);
  var armMesh = new THREE.Mesh(armGeo, armMat);
  armMesh.rotation.z = Math.PI / 2;  // lay it along X
  armMesh.position.x = ARM / 2;       // center at mid-point so it spans 0→ARM
  armMesh.castShadow = true;
  ag.add(armMesh);

  // Motor mount (short vertical cylinder at arm tip)
  var mountGeo  = new THREE.CylinderGeometry(0.068, 0.068, 0.075, 12);
  var mountMesh = new THREE.Mesh(mountGeo, bodyMat);
  mountMesh.position.set(ARM, 0.038, 0);
  mountMesh.castShadow = true;
  ag.add(mountMesh);

  // Motor bell
  var mGeo  = new THREE.CylinderGeometry(0.058, 0.048, 0.095, 16);
  var mMesh = new THREE.Mesh(mGeo, motorMat);
  mMesh.position.set(ARM, 0.125, 0);
  mMesh.castShadow = true;
  ag.add(mMesh);

  // Amber accent ring on motor
  var ringGeo  = new THREE.CylinderGeometry(0.062, 0.062, 0.011, 16);
  var ringMesh = new THREE.Mesh(ringGeo, accentMat);
  ringMesh.position.set(ARM, 0.178, 0);
  ag.add(ringMesh);

  // Propeller disc
  var pGeo  = new THREE.CylinderGeometry(propRadius, propRadius, 0.016, 32);
  var pMesh = new THREE.Mesh(pGeo, propMat);
  pMesh.position.set(ARM, 0.194, 0);
  ag.add(pMesh);

  // Prop hub
  var hubGeo  = new THREE.CylinderGeometry(0.028, 0.028, 0.022, 10);
  var hubMesh = new THREE.Mesi(hubGeo, motorMat);
  hubMesh.position.set(ARM, 0.204, 0);
  ag.add(hubMesh);
}

/* ── LANDING GEAR ───────────────────────────────────────────────────────── */
// Four vertical struts
[ [-0.17,-0.17],[0.17,-0.17],[-0.17,0.17],[0.17,0.17] ].forEach(function(pos){
  var sGeo  = new THREE.CylinderGeometry(0.018, 0.018, 0.20, 8);
  var sMesh = new THREE.Mesh(sGeo, legMat);
  sMesh.position.set(pos[0], -0.10, pos[1]);
  sMesh.castShadow = true;
  drone.add(sMesh);
});
// Two horizontal skids
[-0.14, 0.14].forEach(function(lz){
  var skGeo  = new THREE.CylinderGeometry(0.016, 0.016, 0.46, 8);
  var skMesh = new THREE.Mesh(skGeo, legMat);
  skMesh.rotation.z = Math.PI / 2;
  skMesh.position.set(0, -0.20, lz);
  skMesh.castShadow = true;
  drone.add(skMesh);
});

/* ── PAYLOAD ────────────────────────────────────────────────────────────── */
if(payload === 'camera'){
  // Gimbal arm
  var gaGeo  = new THREE.BoxGeometry(0.038, 0.09, 0.038);
  var gaMesh = new THREE.Mesh(gaGeo, bodyMat);
  gaMesh.position.set(0, -0.055, 0.04);
  drone.add(gaMesh);

  // Gimbal ball (camera housing)
  var gbGeo  = new THREE.SphereGeometry(0.115, 18, 14);
  var gbMat  = new THREE.MeshPhongMaterial({color:0x0c1520, shininess:130});
  var gbMesh = new THREE.Mesh(gbGeo, gbMat);
  gbMesh.position.set(0, -0.155, 0.04);
  drone.add(gbMesh);

  // Camera lens
  var lGeo  = new THREE.CylinderGeometry(0.038, 0.038, 0.048, 16);
  var lMat  = new THREE.MeshPhongMaterial({color:0x1a3a5c, shininess:220});
  var lMesh = new THREE.Mesh(lGeo, lMat);
  lMesh.rotation.x = Math.PI / 2;
  lMesh.position.set(0, -0.155, 0.158);
  drone.add(lMesh);

  // Gimbal accent ring
  var grGeo  = new THREE.CylinderGeometry(0.120, 0.120, 0.013, 20);
  var grMesh = new THREE.Mesh(grGeo, accentMat);
  grMesh.position.set(0, -0.120, 0.04);
  drone.add(grMesh);

} else if(payload === 'lidar'){
  // Mount arm
  var lmGeo  = new THREE.BoxGeometry(0.038, 0.07, 0.038);
  var lmMesh = new THREE.Mesh(lmGeo, bodyMat);
  lmMesh.position.set(0, -0.055, 0);
  drone.add(lmMesh);

  // LiDAR body
  var ldGeo  = new THREE.CylinderGeometry(0.135, 0.135, 0.095, 24);
  var ldMat  = new THREE.MeshPhongMaterial({color:0x090f1c, shininess:70});
  var ldMesh = new THREE.Mesh(ldGeo, ldMat);
  ldMesh.position.set(0, -0.138, 0);
  drone.add(ldMesh);

  // Spinning accent ring
  var lrGeo  = new THREE.CylinderGeometry(0.140, 0.140, 0.028, 24);
  var lrMesh = new THREE.Mesh(lrGeo, accentMat);
  lrMesh.position.set(0, -0.094, 0);
  drone.add(lrMesh);
}

/* ── GROUND GRID ────────────────────────────────────────────────────────── */
var grid = new THREE.GridHelper(28, 50, 0x182840, 0x182840);
grid.position.y = -0.85;
grid.material.opacity = 0.45;
grid.material.transparent = true;
scene.add(grid);

// Shadow catcher (invisible plane for shadows)
var shGeo  = new THREE.PlaneGeometry(30, 30);
var shMat  = new THREE.ShadowMaterial({opacity:0.25});
var shMesh = new THREE.Mesh(shGeo, shMat);
shMesh.rotation.x = -Math.PI / 2;
shMesh.position.y = -0.84;
shMesh.receiveShadow = true;
scene.add(shMesh);

/* ── HUD SPECS ──────────────────────────────────────────────────────────── */
var frameLabel   = frameSize + 'mm Frame';
var motorLabel   = motors + '-Motor (' + (motors===4?'Quad':motors===6?'Hex':'Octo') + ')';
var payloadLabel = payload==='camera' ? 'Camera Gimbal' : payload==='lidar' ? 'LiDAR Unit' : 'No Payload';
var colorLabel   = colorScheme.charAt(0).toUpperCase() + colorScheme.slice(1);

document.getElementById('hudSpecs').innerHTML =
  [['Frame',frameLabel],['Config',motorLabel],['Payload',payloadLabel],['Color',colorLabel]]
  .map(function(x){
    return '<div class="hud-spec">'+x[0]+': <strong>'+x[1]+'</strong></div>';
  }).join('');

/* ── HIDE TIP & LOADING ─────────────────────────────────────────────────── */
setTimeout(function(){ document.getElementById('tip').classList.add('hidden'); }, 5500);
setTimeout(function(){
  var ld = document.getElementById('loading');
  ld.classList.add('hidden');
  setTimeout(function(){ ld.style.display='none'; }, 600);
}, 1100);

/* ── ANIMATION ──────────────────────────────────────────────────────────── */
var clock = 0;
function animate(){
  requestAnimationFrame(animate);
  clock += 0.016;
  // Gentle hover
  drone.position.y = Math.sin(clock * 0.75) * 0.045;
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ── RESIZE ─────────────────────────────────────────────────────────────── */
window.addEventListener('resize', function(){
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

})();
</script>
</body>
</html>
