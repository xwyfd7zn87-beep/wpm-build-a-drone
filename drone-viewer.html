<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WPM AeroMed Drone Viewer</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0b1320;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    canvas { display: block; touch-action: none; }
    #hud {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 20;
    }
    #logo {
      position: absolute;
      top: 18px; left: 18px;
      color: #f59e0b;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 4px;
      text-shadow: 0 0 14px rgba(245,158,11,.65);
    }
    #title {
      position: absolute;
      top: 15px; left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      color: #f59e0b;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 5px;
      text-shadow: 0 0 22px rgba(245,158,11,.55), 0 0 44px rgba(245,158,11,.2);
    }
    #subtitle {
      position: absolute;
      top: 38px; left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      color: rgba(245,158,11,.45);
      font-size: 9px;
      letter-spacing: 4px;
    }
    #hint {
      position: absolute;
      bottom: 26px; left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      color: rgba(245,158,11,.55);
      font-size: 11px;
      letter-spacing: 2px;
      text-align: center;
    }
    #corner-mark {
      position: absolute;
      bottom: 18px; right: 18px;
      color: rgba(245,158,11,.25);
      font-size: 9px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="logo">WPM</div>
    <div id="title">WPM AEROMED DRONE</div>
    <div id="subtitle">QUADCOPTER · MEDICAL DELIVERY</div>
    <div id="hint">TAP &amp; DRAG TO ROTATE &nbsp;·&nbsp; PINCH TO ZOOM</div>
    <div id="corner-mark">v1.0</div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
  (function () {
    "use strict";
    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1320);
    scene.fog = new THREE.FogExp2(0x0b1320, 0.00135);
    var camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 1, 2000);
    camera.position.set(260, 150, 260);
    var controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping  = true;
    controls.dampingFactor  = 0.06;
    controls.autoRotate     = true;
    controls.autoRotateSpeed = 1.3;
    controls.minDistance    = 100;
    controls.maxDistance    = 750;
    controls.maxPolarAngle  = Math.PI * 0.87;
    controls.target.set(0, 0, 0);
    controls.addEventListener('start', function () { controls.autoRotate = false; });
    scene.add(new THREE.AmbientLight(0x1a2d55, 0.75));
    var sun = new THREE.DirectionalLight(0xfff6e0, 1.35);
    sun.position.set(180, 320, 160);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.near=-320; sun.shadow.camera.far=900;
    sun.shadow.camera.left=-320; sun.shadow.camera.right=320;
    sun.shadow.camera.top=320; sun.shadow.camera.bottom=-320;
    scene.add(sun);
    var rim = new THREE.DirectionalLight(0x2255ff, 0.65);
    rim.position.set(-260, 60, -220);
    scene.add(rim);
    var amberPt = new THREE.PointLight(0xf59e0b, 0.22, 550);
    amberPt.position.set(0, 180, 0);
    scene.add(amberPt);
    var MAT = {
      body:      new THREE.MeshStandardMaterial({ color:0x1a1a2e, roughness:0.25, metalness:0.80 }),
      innerTop:  new THREE.MeshStandardMaterial({ color:0x0c0c1e, roughness:0.50, metalness:0.55 }),
      trim:      new THREE.MeshStandardMaterial({ color:0xf59e0b, roughness:0.15, metalness:0.85, emissive:0xf59e0b, emissiveIntensity:0.10 }),
      arm:       new THREE.MeshStandardMaterial({ color:0x141428, roughness:0.35, metalness:0.70 }),
      motorPad:  new THREE.MeshStandardMaterial({ color:0x1c1c38, roughness:0.30, metalness:0.80 }),
      motor:     new THREE.MeshStandardMaterial({ color:0x252535, roughness:0.20, metalness:0.95 }),
      motorBell: new THREE.MeshStandardMaterial({ color:0x353558, roughness:0.14, metalness:0.96 }),
      prop:      new THREE.MeshStandardMaterial({ color:0x1e1e3c, roughness:0.45, metalness:0.30, transparent:true, opacity:0.87, side:THREE.DoubleSide }),
      gear:      new THREE.MeshStandardMaterial({ color:0x1a1a2e, roughness:0.45, metalness:0.60 }),
      fc:        new THREE.MeshStandardMaterial({ color:0x09091a, roughness:0.20, metalness:0.92 }),
      cam:       new THREE.MeshStandardMaterial({ color:0x101018, roughness:0.18, metalness:0.92 }),
      lens:      new THREE.MeshStandardMaterial({ color:0x001022, roughness:0.04, metalness:0.88 }),
      glint:     new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xffffff, emissiveIntensity:0.45, transparent:true, opacity:0.28 }),
    };
    function mk(geo, mat, cast, recv) {
      var m = new THREE.Mesh(geo, mat);
      m.castShadow=(cast!==false); m.receiveShadow=(recv===true); return m;
    }
    var drone = new THREE.Group();
    scene.add(drone);
    var body = mk(new THREE.CylinderGeometry(60,60,22,8), MAT.body);
    drone.add(body);
    [11.5,-11.5].forEach(function(y){
      var r=mk(new THREE.CylinderGeometry(62,62,3,8),MAT.trim); r.position.y=y; drone.add(r);
    });
    var topPanel=mk(new THREE.CylinderGeometry(51,51,3.5,8),MAT.innerTop);
    topPanel.position.y=12.5; drone.add(topPanel);
    for(var d=0;d<4;d++){
      var da=d*Math.PI/2+Math.PI/4;
      var dot=mk(new THREE.CylinderGeometry(3.2,3.2,2,8),MAT.trim);
      dot.position.set(Math.cos(da)*32,14.7,Math.sin(da)*32); drone.add(dot);
    }
    var ARM_ANGLES=[45,135,225,315], ARM_ORIGIN=58, ARM_LEN=130;
    var ARM_TIP=ARM_ORIGIN+ARM_LEN, DIHEDRAL=5*Math.PI/180;
    var propSpinners=[];
    ARM_ANGLES.forEach(function(deg,idx){
      var rad=deg*Math.PI/180;
      var yGrp=new THREE.Group(); yGrp.rotation.y=rad; drone.add(yGrp);
      var tiltGrp=new THREE.Group(); tiltGrp.rotation.z=-DIHEDRAL; yGrp.add(tiltGrp);
      var armMesh=mk(new THREE.CylinderGeometry(4,9,ARM_LEN,6),MAT.arm);
      armMesh.rotation.z=Math.PI/2; armMesh.position.x=ARM_ORIGIN+ARM_LEN/2; tiltGrp.add(armMesh);
      var band=mk(new THREE.CylinderGeometry(6,6,3.5,6),MAT.trim);
      band.rotation.z=Math.PI/2; band.position.x=ARM_ORIGIN+ARM_LEN*0.45; tiltGrp.add(band);
      var pad=mk(new THREE.CylinderGeometry(20,20,5.5,8),MAT.motorPad);
      pad.position.x=ARM_TIP; tiltGrp.add(pad);
      var padRing=mk(new THREE.CylinderGeometry(21.5,21.5,2.5,8),MAT.trim);
      padRing.position.set(ARM_TIP,4,0); tiltGrp.add(padRing);
      var motorMesh=mk(new THREE.CylinderGeometry(9,11,14,12),MAT.motor);
      motorMesh.position.set(ARM_TIP,11,0); tiltGrp.add(motorMesh);
      var bell=mk(new THREE.CylinderGeometry(9.5,9.5,7,12),MAT.motorBell);
      bell.position.set(ARM_TIP,21.5,0); tiltGrp.add(bell);
      var spinner=new THREE.Group(); spinner.position.set(ARM_TIP,26,0);
      for(var b=0;b<4;b++){
        var bAngle=(b/4)*Math.PI*2+Math.PI/4;
        var blade=mk(new THREE.BoxGeometry(30,2,10),MAT.prop,false);
        blade.rotation.y=-bAngle;
        blade.position.set(Math.cos(bAngle)*15,0,Math.sin(bAngle)*15);
        blade.rotation.z=0.10; spinner.add(blade);
      }
      tiltGrp.add(spinner);
      propSpinners.push({group:spinner,dir:(idx%2===0)?1:-1});
    });
    var fc=mk(new THREE.BoxGeometry(44,10,44),MAT.fc); fc.position.y=17; drone.add(fc);
    var ledF=mk(new THREE.BoxGeometry(46,2.5,2.5),MAT.trim); ledF.position.set(0,22.5,-23); drone.add(ledF);
    var ledR=mk(new THREE.BoxGeometry(2.5,2.5,46),MAT.trim); ledR.position.set(23,22.5,0); drone.add(ledR);
    var ant=mk(new THREE.CylinderGeometry(1.5,1.5,24,6),MAT.motor); ant.position.set(18,33,18); drone.add(ant);
    var antTip=mk(new THREE.SphereGeometry(2.5,8,8),MAT.trim); antTip.position.set(18,45,18); drone.add(antTip);
    var gimbalStem=mk(new THREE.CylinderGeometry(6,9,10,8),MAT.motor); gimbalStem.position.y=-17; drone.add(gimbalStem);
    var yoke=mk(new THREE.BoxGeometry(30,5.5,4),MAT.motor); yoke.position.set(0,-25,0); drone.add(yoke);
    var camBody=mk(new THREE.BoxGeometry(24,17,27),MAT.cam); camBody.position.set(0,-29,2); drone.add(camBody);
    var lensBarrel=mk(new THREE.CylinderGeometry(6,7.5,10,14),MAT.lens);
    lensBarrel.rotation.x=Math.PI/2; lensBarrel.position.set(0,-29,16.5); drone.add(lensBarrel);
    var glintDot=mk(new THREE.CylinderGeometry(2.2,2.2,1,12),MAT.glint,false);
    glintDot.rotation.x=Math.PI/2; glintDot.position.set(-2,-27.5,21); drone.add(glintDot);
    [{x:36,z:36},{x:-36,z:36},{x:36,z:-36},{x:-36,z:-36}].forEach(function(p){
      var strut=mk(new THREE.CylinderGeometry(2.2,2.2,44,6),MAT.gear);
      strut.position.set(p.x,-26,p.z);
      strut.rotation.x=(p.z>0?1:-1)*0.30; strut.rotation.z=(p.x>0?-1:1)*0.30; drone.add(strut);
      var foot=mk(new THREE.CylinderGeometry(4,4,4,8),MAT.trim);
      foot.position.set(p.x+(p.x>0?9:-9),-44,p.z+(p.z>0?9:-9)); drone.add(foot);
    });
    var grid=new THREE.GridHelper(700,28,0x1a2f4f,0x0e1a2d);
    grid.position.y=-95; grid.receiveShadow=true; scene.add(grid);
    window.addEventListener('resize',function(){
      camera.aspect=window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth,window.innerHeight);
    });
    var t=0;
    function animate(){
      requestAnimationFrame(animate); t+=0.016;
      propSpinners.forEach(function(ps){ ps.group.rotation.y+=0.20*ps.dir; });
      drone.position.y=Math.sin(t*0.75)*3.5;
      drone.rotation.x=Math.sin(t*0.50)*0.020;
      drone.rotation.z=Math.cos(t*0.60)*0.016;
      controls.update(); renderer.render(scene,camera);
    }
    animate();
  })();
  </script>
</body>
</html>
